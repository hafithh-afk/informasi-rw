<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi RW</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f4f7f6; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>

    <script>
        // 1. Membaca perintah halaman (?p=...) dari URL Vercel
        const urlParams = new URLSearchParams(window.location.search);
        const halaman = urlParams.get('p');
        
        // 2. GANTI DENGAN LINK GOOGLE APPS SCRIPT ANDA (YANG AKHIRANNYA /exec)
        const linkGoogleScript = "https://script.google.com/macros/s/AKfycbx6L6LhbWgaEgW81ODQDYMDVdof6Lr_gIOLQJOdg4PVB29MU2K-7y7IG2r3zfaAW7Mm/exec";

        // 3. Logika Navigasi: Jika ada 'p', buka halaman itu. Jika tidak ada, buka Menu Utama.
        let finalUrl = linkGoogleScript;
        if (halaman) {
            finalUrl = linkGoogleScript + "?p=" + halaman;
        }

        // Tampilkan website di dalam bingkai
        document.write('<iframe src="' + finalUrl + '"></iframe>');
    </script>

</body>
</html>
